<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deinococcus radiodurans 文献库</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1a5f2a; --primary-light: #2d8a3e; --primary-dark: #0d3d18;
            --accent: #d4a843; --bg: #f5f3ef; --card: #fff;
            --text: #2c2c2c; --text-light: #5a5a5a; --border: #d8d4cc;
            --shadow: 0 2px 12px rgba(0,0,0,0.08); --shadow-h: 0 4px 20px rgba(0,0,0,0.12);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; }
        .container { max-width: 960px; margin: 0 auto; padding: 0 20px; }
        header { text-align: center; padding: 48px 0 32px; }
        header h1 { font-size: 2rem; font-weight: 700; color: var(--primary-dark); }
        .subtitle { color: var(--text-light); margin-top: 8px; font-size: 0.95rem; }
        .subtitle strong { color: var(--primary); }

        .search-box { display: flex; gap: 12px; margin-bottom: 24px; }
        input[type="text"] {
            flex: 1; padding: 14px 18px; font-size: 1rem; border: 2px solid var(--border);
            border-radius: 8px; outline: none; transition: all 0.25s;
        }
        input[type="text"]:focus { border-color: var(--primary-light); box-shadow: 0 0 0 3px rgba(26,95,42,0.1); }
        button {
            display: flex; align-items: center; gap: 6px; padding: 14px 24px;
            font-size: 1rem; font-weight: 600; color: #fff; background: var(--primary);
            border: none; border-radius: 8px; cursor: pointer; transition: all 0.25s;
        }
        button:hover { background: var(--primary-dark); transform: translateY(-1px); }

        .tips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .tips span { font-size: 0.82rem; color: #999; margin-right: 4px; }
        .tip {
            font-size: 0.82rem; padding: 4px 12px; background: #eef5ee;
            color: var(--primary); border-radius: 20px; cursor: pointer; transition: all 0.25s;
        }
        .tip:hover { background: var(--primary); color: #fff; }

        .status { text-align: center; padding: 40px; color: var(--text-light); }
        .spinner { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--primary); border-radius: 50%; animation: s 0.8s linear infinite; margin: 0 auto 12px; }
        @keyframes s { to { transform: rotate(360deg); } }

        .result-info { font-size: 0.88rem; color: var(--text-light); margin-bottom: 16px; }
        .card {
            background: var(--card); border-radius: 10px; padding: 18px 22px;
            box-shadow: var(--shadow); cursor: pointer; transition: all 0.25s;
            border: 1px solid transparent; margin-bottom: 12px;
        }
        .card:hover { box-shadow: var(--shadow-h); border-color: var(--primary-light); transform: translateY(-2px); }
        .card-head { display: flex; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; align-items: center; }
        .num { font-size: 0.8rem; font-weight: 700; color: var(--primary); background: #eef5ee; padding: 2px 10px; border-radius: 12px; }
        .year { font-size: 0.78rem; color: var(--accent); font-weight: 600; background: #fdf6e3; padding: 2px 10px; border-radius: 12px; }
        .pmid-tag { font-size: 0.78rem; color: var(--text-light); }
        .score {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--primary);
            background: #e8f0e8;
            padding: 2px 10px;
            border-radius: 12px;
            margin-left: auto;
        }
        .card h3 { font-size: 1.05rem; font-weight: 600; line-height: 1.45; margin-bottom: 6px; }
        .card:hover h3 { color: var(--primary); }
        .card .authors { font-size: 0.88rem; color: var(--text-light); }
        .card .journal { font-size: 0.82rem; color: #888; font-style: italic; }
        mark { background: #ffe066; padding: 1px 3px; border-radius: 3px; }

        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: 100; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); }
        .content { position: relative; background: var(--card); border-radius: 10px; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: m 0.3s ease; }
        @keyframes m { from { opacity: 0; transform: translateY(20px) scale(0.97); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .close-btn { position: absolute; top: 12px; right: 16px; width: 36px; height: 36px; border: none; background: #f0f0f0; border-radius: 50%; font-size: 1.4rem; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
        .close-btn:hover { background: #e0e0e0; }
        .detail { padding: 28px 32px; }
        .detail-head { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 16px; padding-bottom: 14px; border-bottom: 2px solid var(--primary-light); }
        .detail-num { font-size: 0.85rem; font-weight: 700; color: var(--primary); }
        .links { display: flex; gap: 8px; }
        .links a { display: inline-block; padding: 6px 14px; font-size: 0.82rem; font-weight: 600; text-decoration: none; border-radius: 6px; transition: all 0.25s; }
        .links a:first-child { background: var(--primary); color: #fff; }
        .links a:first-child:hover { background: var(--primary-dark); }
        .links a:last-child { background: #eef5ee; color: var(--primary); }
        .links a:last-child:hover { background: var(--primary); color: #fff; }
        .detail h2 { font-size: 1.3rem; font-weight: 700; line-height: 1.45; margin-bottom: 12px; }
        .detail .meta { display: flex; flex-wrap: wrap; gap: 12px 24px; margin-bottom: 20px; font-size: 0.88rem; color: var(--text-light); }
        .detail .meta strong { color: var(--text); }
        .abstract-box { background: #faf9f7; border-radius: 8px; padding: 20px 22px; border-left: 4px solid var(--accent); }
        .abstract-box h4 { font-size: 0.85rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
        .abstract-box p { font-size: 0.95rem; line-height: 1.7; text-align: justify; }
        .mesh { margin-top: 16px; }
        .mesh span { display: inline-block; font-size: 0.78rem; padding: 3px 10px; background: #eef5ee; color: var(--primary); border-radius: 12px; margin: 3px; }

        footer { text-align: center; padding: 40px 0; font-size: 0.82rem; color: #aaa; }
        .hidden { display: none !important; }

        @media (max-width: 600px) {
            header h1 { font-size: 1.5rem; }
            .search-box { flex-direction: column; }
            .content { max-height: 95vh; }
            .detail { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Deinococcus radiodurans 文献库</h1>
            <p class="subtitle">耐辐射奇球菌研究文献检索系统 | 共收录 <strong id="total">—</strong> 篇文献</p>
        </header>

        <div class="search-box">
            <input type="text" id="q" placeholder="输入序号(1-1344)、标题关键词、作者名或PMID...">
            <button id="btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
                搜索
            </button>
        </div>

        <div class="tips">
            <span>快速查询:</span>
            <div class="tip" data-q="189">#189</div>
            <div class="tip" data-q="RecA">RecA</div>
            <div class="tip" data-q="deinoxanthin">deinoxanthin</div>
            <div class="tip" data-q="PprI">PprI</div>
            <div class="tip" data-q="辐射">辐射</div>
        </div>

        <div id="status" class="status">
            <div class="spinner"></div>
            <p>正在加载文献数据库...</p>
        </div>

        <div id="results"></div>

        <div id="modal" class="modal hidden">
            <div class="overlay"></div>
            <div class="content">
                <button class="close-btn">&times;</button>
                <div id="detail" class="detail"></div>
            </div>
        </div>

        <footer>耐辐射奇球菌研究 | Deinococcus radiodurans Research Database</footer>
    </div>

    <script>
    (function() {
        let DB = null;
        const $ = id => document.getElementById(id);
        const esc = t => t.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
        const hl = (t, q) => {
            if (!q) return esc(t);
            const r = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
            return esc(t).replace(r, '<mark>$1</mark>');
        };

        // V8 引擎常量
        const STOP_WORDS = new Set([
            'the','a','an','is','are','was','were','be','been','being',
            'have','has','had','do','does','did','will','would','could','should',
            'may','might','can','shall','must','lt','gt',
            'of','and','or','but','in','on','at','to','for','with','by',
            'from','up','about','into','through','during','before','after',
            'above','below','between','among','this','that','these','those',
            'i','you','he','she','it','we','they','me','him','her','us','them',
            'as','if','so','than','too','very','just','now','then','here',
            'there','when','where','why','how','all','each','every','both',
            'few','more','most','other','some','such','no','nor','not',
            'only','own','same'
        ]);
        const BATCH_SIZE = 8;
        const UNIQUE_THRESHOLD = 15;

        // 加载数据库
        fetch('database.json').then(r => r.json()).then(data => {
            DB = data;
            $('total').textContent = Object.keys(DB).length;
            $('status').innerHTML = '<p>数据库加载完成！请输入序号或关键词搜索</p>';
            $('q').focus();
        }).catch(() => {
            $('status').innerHTML = '<p>数据库加载失败，请刷新页面重试</p>';
        });

        // ═══════════════════════════════════════════════════════
        // V8 查询清洗
        // ═══════════════════════════════════════════════════════
        function cleanQuery(query) {
            let q = query.trim();

            // 1. 去 UUID、前导数字
            q = q.replace(/^[a-f0-9]{8}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{4}-[a-f0-9]{12}_?/i, '');
            q = q.replace(/^\d+[\-_\s]+/, '');
            q = q.replace(/_/g, ' ');
            q = q.replace(/(?<=[a-zA-Z])\-(?=[a-zA-Z])/g, ' ');

            // 2. 提取年份
            const yearMatch = q.match(/\b(19\d{2}|20\d{2})\b/);
            const year = yearMatch ? parseInt(yearMatch[1]) : null;

            // 3. 提取期刊名
            const journalWords = [];
            const sourceMatch = q.match(/\bSource\b/i);
            const soMatch = q.match(/\bSO\s+\d{4}\b/i);
            if (sourceMatch && soMatch) {
                const journalRaw = q.substring(sourceMatch.index + sourceMatch[0].length, soMatch.index).trim();
                for (const w of journalRaw.split(/\s+/)) {
                    const clean = w.replace(/[^a-zA-Z]/g, '');
                    if (clean && clean.length >= 2 && !STOP_WORDS.has(clean.toLowerCase())) {
                        journalWords.push(clean);
                    }
                }
            }

            // 4. 清理 Source 及之后
            if (sourceMatch) {
                q = q.substring(0, sourceMatch.index);
            }

            // 5. 再次清理 SO YYYY
            const soMatch2 = q.match(/\bSO\s+\d{4}\b/i);
            if (soMatch2) {
                q = q.substring(0, soMatch2.index);
            }

            // 6. 清理 HTML 实体
            q = q.replace(/\blt\b|\bgt\b|\bi\b|\bb\b/gi, '');

            // 7. 拆分清洗
            const words = [];
            for (const word of q.split(/\s+/)) {
                let w = word;
                while (w && ',.;:!?'.includes(w[w.length-1])) w = w.slice(0, -1);
                while (w && ',.;:!?'.includes(w[0])) w = w.slice(1);
                if (w) words.push(w);
            }

            // 8. 停用词过滤
            const result = words.filter(w => !STOP_WORDS.has(w.toLowerCase()));
            return { words: result, journalWords, year };
        }

        // ═══════════════════════════════════════════════════════
        // V8 匹配与评分函数
        // ═══════════════════════════════════════════════════════
        function containsWholeWord(title, word) {
            if (!title || !word) return false;
            try {
                const pattern = '\\b' + word.toLowerCase() + '\\b';
                return new RegExp(pattern, 'i').test(title);
            } catch (e) { return false; }
        }

        function containsPrefixWord(title, word) {
            if (!title || !word) return false;
            try {
                const pattern = '\\b' + word.toLowerCase() + '\\w*\\b';
                return new RegExp(pattern, 'i').test(title);
            } catch (e) { return false; }
        }

        function containsSubstring(title, word) {
            if (!title || !word) return false;
            return title.toLowerCase().includes(word.toLowerCase());
        }

        function getWordPositions(title, queryWords, matchFn) {
            const titleLower = title.toLowerCase();
            const positions = [];
            for (const word of queryWords) {
                if (!matchFn(title, word)) continue;
                const wordLower = word.toLowerCase();
                let pattern = '\\b' + wordLower.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b';
                if (word.length <= 4) {
                    pattern = '\\b' + wordLower.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\w*\\b';
                }
                const regex = new RegExp(pattern, 'gi');
                const m = regex.exec(titleLower);
                if (m) positions.push([word, m.index, m.index + m[0].length]);
            }
            return positions;
        }

        function calcPhraseBonus(title, words) {
            const titleLower = title.toLowerCase();
            let bonus = 0;
            for (let i = 0; i < words.length - 1; i++) {
                const phrase = words[i].toLowerCase() + ' ' + words[i+1].toLowerCase();
                if (titleLower.includes(phrase)) bonus += 12;
            }
            for (let i = 0; i < words.length - 2; i++) {
                const phrase = words[i].toLowerCase() + ' ' + words[i+1].toLowerCase() + ' ' + words[i+2].toLowerCase();
                if (titleLower.includes(phrase)) bonus += 20;
            }
            return Math.min(bonus, 40);
        }

        function calcOrderScore(title, queryWords, matchFn) {
            const positions = getWordPositions(title, queryWords, matchFn);
            if (positions.length <= 1) return 0;
            const starts = positions.map(p => p[1]);
            const dp = starts.map(() => 1);
            for (let i = 1; i < starts.length; i++) {
                for (let j = 0; j < i; j++) {
                    if (starts[i] > starts[j]) dp[i] = Math.max(dp[i], dp[j] + 1);
                }
            }
            const orderScore = (Math.max(...dp) / queryWords.length) * 30;
            let consecutiveBonus = 0;
            for (let i = 1; i < positions.length; i++) {
                const gap = positions[i][1] - positions[i-1][2];
                if (gap === 0) consecutiveBonus += 3;
                else if (gap <= 1) consecutiveBonus += 10;
                else if (gap <= 5) consecutiveBonus += 7;
                else if (gap <= 15) consecutiveBonus += 5;
                else if (gap <= 30) consecutiveBonus += 2;
            }
            return Math.round(orderScore + Math.min(consecutiveBonus, 30));
        }

        function calcJournalScore(entryJournal, journalWords) {
            if (!journalWords || !journalWords.length || !entryJournal) return 0;
            let matched = 0;
            for (const w of journalWords) {
                if (containsPrefixWord(entryJournal, w)) matched++;
            }
            if (matched === 0) return 0;
            let score = matched * 12;
            if (matched === journalWords.length) score += 15;
            return Math.min(score, 40);
        }

        function calcYearScore(entryYear, queryYear) {
            if (queryYear === null || queryYear === undefined || entryYear === null || entryYear === undefined) return 0;
            return entryYear == queryYear ? 25 : 0;
        }

        function calcScore(title, words, matchFn, journalWords, entryJournal, queryYear, entryYear) {
            const titleLower = title.toLowerCase();
            let score = 0;
            let matchedCount = 0;
            let caseSensitiveMatch = false;

            for (const word of words) {
                if (matchFn(title, word)) matchedCount++;
                if (title.includes(word)) caseSensitiveMatch = true;
            }

            if (words.length > 0) {
                score += (matchedCount / words.length) * 50;
            }

            if (matchedCount > 0) {
                const positions = getWordPositions(title, words, matchFn);
                if (positions.length > 0) {
                    const half = titleLower.length / 2;
                    const allFirst = positions.every(p => p[1] < half);
                    const someFirst = positions.some(p => p[1] < half);
                    if (allFirst) score += 25;
                    else if (someFirst) score += 15;
                    else score += 5;
                }
            }

            const qJoined = words.join(' ').toLowerCase();
            if (titleLower.includes(qJoined)) score += 25;
            if (caseSensitiveMatch) score += 5;

            score += calcOrderScore(title, words, matchFn);
            score += calcPhraseBonus(title, words);

            if (matchedCount > 0 && words.length > 0) {
                let coveredChars = 0;
                for (const w of words) {
                    if (matchFn(title, w)) coveredChars += w.length;
                }
                const titleLen = titleLower.replace(/\s/g, '').length;
                if (titleLen > 0) score += Math.round(coveredChars / titleLen * 20);
            }

            if (journalWords && journalWords.length > 0 && entryJournal) {
                score += calcJournalScore(entryJournal, journalWords);
            }

            if (queryYear !== null && queryYear !== undefined && entryYear !== null && entryYear !== undefined) {
                score += calcYearScore(entryYear, queryYear);
            }

            return Math.round(score);
        }

        // ═══════════════════════════════════════════════════════
        // V8 交集构建
        // ═══════════════════════════════════════════════════════
        function buildIntersectionStrict(entries, words, limit) {
            let intersection = null;
            let lastNonEmpty = null;
            const failedWords = [];
            for (let i = 0; i < limit; i++) {
                const word = words[i];
                const matches = new Set();
                for (const e of entries) {
                    if (containsWholeWord(e.title, word)) matches.add(String(e.number));
                }
                if (matches.size === 0) {
                    failedWords.push(word);
                    if (intersection !== null) {
                        return { set: lastNonEmpty || new Set(), failedWords };
                    }
                    continue;
                }
                if (intersection === null) {
                    intersection = matches;
                } else {
                    intersection = new Set([...intersection].filter(x => matches.has(x)));
                }
                if (intersection.size === 1) {
                    return { set: intersection, failedWords };
                }
                if (intersection.size > 0) {
                    lastNonEmpty = new Set(intersection);
                }
            }
            return { set: intersection || new Set(), failedWords };
        }

        function buildIntersectionAllFuzzy(entries, words, limit) {
            let intersection = null;
            let lastNonEmpty = null;
            for (let i = 0; i < limit; i++) {
                const word = words[i];
                const matches = new Set();
                for (const e of entries) {
                    if (containsPrefixWord(e.title, word)) matches.add(String(e.number));
                }
                if (matches.size === 0) {
                    return lastNonEmpty || new Set();
                }
                if (intersection === null) {
                    intersection = matches;
                } else {
                    intersection = new Set([...intersection].filter(x => matches.has(x)));
                }
                if (intersection.size === 1) {
                    return intersection;
                }
                if (intersection.size > 0) {
                    lastNonEmpty = new Set(intersection);
                }
            }
            return intersection || new Set();
        }

        // ═══════════════════════════════════════════════════════
        // V8 搜索主函数
        // ═══════════════════════════════════════════════════════
        function search(query) {
            if (!DB || !query) return [];
            const q = query.trim();

            // 精确序号匹配
            if (/^\d+$/.test(q) && DB[q]) {
                const entry = Object.assign({}, DB[q]);
                entry._score = 100;
                entry._matchStatus = 'exact_number';
                return [entry];
            }

            const { words, journalWords, year } = cleanQuery(q);
            if (words.length === 0 && journalWords.length === 0 && year === null) {
                return [];
            }

            const allEntries = Object.values(DB);

            // Phase 1: 严格整词交集
            const { set: strictSet, failedWords } = buildIntersectionStrict(
                allEntries, words, Math.min(words.length, BATCH_SIZE));

            // 剩余单词继续严格
            if (strictSet.size > 1 && words.length > BATCH_SIZE) {
                let lastNonEmpty = strictSet.size > 0 ? new Set(strictSet) : null;
                for (let i = BATCH_SIZE; i < words.length; i++) {
                    const word = words[i];
                    const matches = new Set();
                    for (const e of allEntries) {
                        if (containsWholeWord(e.title, word)) matches.add(String(e.number));
                    }
                    if (matches.size === 0) {
                        strictSet = lastNonEmpty || new Set();
                        break;
                    }
                    strictSet = new Set([...strictSet].filter(x => matches.has(x)));
                    if (strictSet.size === 1) break;
                    if (strictSet.size > 0) lastNonEmpty = new Set(strictSet);
                }
            }

            if (strictSet.size === 1) {
                const num = [...strictSet][0];
                for (const e of allEntries) {
                    if (String(e.number) === num) {
                        const entry = Object.assign({}, e);
                        entry._score = 100;
                        entry._matchStatus = 'unique_match_strict';
                        return [entry];
                    }
                }
            }

            // Phase 2: 前缀模糊交集
            let fuzzySet = new Set();
            if (strictSet.size === 0) {
                fuzzySet = buildIntersectionAllFuzzy(allEntries, words, Math.min(words.length, BATCH_SIZE));
            } else if (strictSet.size > 1 && failedWords.length > 0) {
                fuzzySet = buildIntersectionAllFuzzy(allEntries, words, Math.min(words.length, BATCH_SIZE));
            }

            if (fuzzySet.size === 1) {
                const num = [...fuzzySet][0];
                for (const e of allEntries) {
                    if (String(e.number) === num) {
                        const entry = Object.assign({}, e);
                        entry._score = 95;
                        entry._matchStatus = failedWords.length > 0 ? 'unique_match_fuzzy' : 'unique_match_strict';
                        return [entry];
                    }
                }
            }

            if (fuzzySet.size > 0) {
                strictSet = fuzzySet;
            }

            // Phase 3: 综合评分排序
            if (strictSet.size > 1) {
                const matchFn = failedWords.length > 0 ? containsPrefixWord : containsWholeWord;
                const scored = [];
                for (const e of allEntries) {
                    if (strictSet.has(String(e.number))) {
                        const s = calcScore(
                            e.title || '', words, matchFn,
                            journalWords, e.journal,
                            year, e.year
                        );
                        const entry = Object.assign({}, e);
                        entry._score = s;
                        entry._matchStatus = 'multi_match';
                        scored.push([entry, s]);
                    }
                }
                scored.sort((a, b) => b[1] - a[1]);

                // 分差阈值唯一化
                if (scored.length >= 2 && (scored[0][1] - scored[1][1]) >= UNIQUE_THRESHOLD) {
                    scored[0][0]._matchStatus = failedWords.length > 0 ? 'unique_match_fuzzy' : 'unique_match_strict';
                    return [scored[0][0]];
                }

                return scored.slice(0, 30).map(x => x[0]);
            }

            // Fallback: 子串匹配
            const subMatches = allEntries.filter(e => {
                const titleLower = (e.title || '').toLowerCase();
                return words.every(w => titleLower.includes(w.toLowerCase()));
            });

            if (subMatches.length > 0) {
                const scored = subMatches.map(e => {
                    const s = calcScore(
                        e.title || '', words, containsSubstring,
                        journalWords, e.journal,
                        year, e.year
                    );
                    const entry = Object.assign({}, e);
                    entry._score = s;
                    entry._matchStatus = 'substring_fallback';
                    return [entry, s];
                });
                scored.sort((a, b) => b[1] - a[1]);

                if (scored.length >= 2 && (scored[0][1] - scored[1][1]) >= UNIQUE_THRESHOLD) {
                    scored[0][0]._matchStatus = 'unique_match_fallback';
                    return [scored[0][0]];
                }

                return scored.slice(0, 30).map(x => x[0]);
            }

            // Fallback 2: 作者搜索
            const qLower = q.toLowerCase();
            const results = [];
            for (const e of allEntries) {
                if ((e.authors || '').toLowerCase().includes(qLower)) {
                    const entry = Object.assign({}, e);
                    entry._score = 10;
                    entry._matchStatus = 'author_match';
                    results.push(entry);
                    if (results.length >= 30) break;
                }
            }
            if (results.length > 0) return results;

            // Fallback 3: PMID 精确匹配
            for (const e of allEntries) {
                if (e.pmid === q) {
                    const entry = Object.assign({}, e);
                    entry._score = 100;
                    entry._matchStatus = 'pmid_match';
                    return [entry];
                }
            }

            // Fallback 4: 摘要全文匹配
            const abstractResults = [];
            for (const e of allEntries) {
                if ((e.abstract || '').toLowerCase().includes(qLower)) {
                    const entry = Object.assign({}, e);
                    entry._score = 5;
                    entry._matchStatus = 'abstract_match';
                    abstractResults.push(entry);
                    if (abstractResults.length >= 30) break;
                }
            }
            return abstractResults;
        }

        // ═══════════════════════════════════════════════════════
        // 渲染
        // ═══════════════════════════════════════════════════════
        function render() {
            const q = $('q').value.trim();
            const results = search(q);
            const out = $('results');

            if (!results.length) {
                out.innerHTML = '<div class="status">未找到与 "' + esc(q) + '" 相关的文献</div>';
                $('status').classList.add('hidden');
                return;
            }

            $('status').classList.add('hidden');
            let h = '<div class="result-info">找到 ' + results.length + ' 条结果</div>';

            results.forEach(e => {
                const statusLabel = {
                    'exact_number': '精确序号',
                    'unique_match_strict': '唯一匹配',
                    'unique_match_fuzzy': '模糊唯一',
                    'unique_match_fallback': '回退唯一',
                    'multi_match': '多匹配',
                    'substring_fallback': '子串匹配',
                    'author_match': '作者匹配',
                    'pmid_match': 'PMID匹配',
                    'abstract_match': '摘要匹配'
                }[e._matchStatus] || '';

                h += '<div class="card" data-num="' + e.number + '">' +
                    '<div class="card-head">' +
                        '<span class="num">#' + e.number + '</span>' +
                        (e.year ? '<span class="year">' + e.year + '</span>' : '') +
                        '<span class="pmid-tag">PMID: ' + e.pmid + '</span>' +
                        (e._score !== undefined ? '<span class="score">匹配度: ' + e._score + (statusLabel ? ' (' + statusLabel + ')' : '') + '</span>' : '') +
                    '</div>' +
                    '<h3>' + hl(e.title, q) + '</h3>' +
                    '<p class="authors">' + hl(e.authors, q) + '</p>' +
                    '<p class="journal">' + esc(e.journal) + '</p>' +
                '</div>';
            });
            out.innerHTML = h;

            if (results.length === 1) show(results[0]);
        }

        function show(e) {
            const pmidLink = 'https://pubmed.ncbi.nlm.nih.gov/' + e.pmid + '/';
            const doiLink = e.doi ? 'https://doi.org/' + e.doi : '';

            let h = '<div class="detail-head">' +
                '<span class="detail-num">文献 #' + e.number + '</span>' +
                '<div class="links">' +
                    '<a href="' + pmidLink + '" target="_blank">PubMed</a>' +
                    (doiLink ? '<a href="' + doiLink + '" target="_blank">DOI</a>' : '') +
                '</div></div>' +
                '<h2>' + esc(e.title) + '</h2>' +
                '<p class="authors">' + esc(e.authors) + '</p>' +
                '<div class="meta">' +
                    '<span><strong>期刊:</strong> ' + esc(e.journal) + '</span>' +
                    (e.year ? '<span><strong>年份:</strong> ' + e.year + '</span>' : '') +
                    '<span><strong>PMID:</strong> ' + e.pmid + '</span>' +
                    (e.pmcid ? '<span><strong>PMCID:</strong> ' + e.pmcid + '</span>' : '') +
                    (e.doi ? '<span><strong>DOI:</strong> ' + e.doi + '</span>' : '') +
                '</div>' +
                '<div class="abstract-box">' +
                    '<h4>Abstract</h4>' +
                    '<p>' + esc(e.abstract) + '</p>' +
                '</div>';

            if (e.mesh_terms && e.mesh_terms.length) {
                h += '<div class="mesh"><h4>MeSH Terms</h4>';
                e.mesh_terms.forEach(t => { h += '<span>' + esc(t) + '</span>'; });
                h += '</div>';
            }

            $('detail').innerHTML = h;
            $('modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function hide() { $('modal').classList.add('hidden'); document.body.style.overflow = ''; }

        // 事件绑定
        $('btn').addEventListener('click', render);
        $('q').addEventListener('keypress', e => { if (e.key === 'Enter') render(); });
        document.querySelectorAll('.tip').forEach(t => {
            t.addEventListener('click', () => { $('q').value = t.dataset.q; render(); });
        });
        $('results').addEventListener('click', e => {
            const c = e.target.closest('.card');
            if (c && c.dataset.num) show(DB[c.dataset.num]);
        });
        document.querySelector('.close-btn').addEventListener('click', hide);
        document.querySelector('.overlay').addEventListener('click', hide);
        document.addEventListener('keydown', e => { if (e.key === 'Escape') hide(); });
    })();
    </script>
</body>
